version: '3.8'

services:
  # ── Keycloak Database ──────────────────────────────────────────
  keycloak-db:
    image: postgres:15-alpine
    container_name: ironden-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - ironden
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak Auth Server ───────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: ironden-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - ironden
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo 'OK' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Application Database ───────────────────────────────────────
  app-db:
    image: postgres:15-alpine
    container_name: ironden-app-db
    environment:
      POSTGRES_DB: ironden
      POSTGRES_USER: ironden
      POSTGRES_PASSWORD: ironden_pass
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks:
      - ironden
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironden"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ironden-backend
    environment:
      DATABASE_URL: postgresql://ironden:ironden_pass@app-db:5432/ironden
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ironden
      KEYCLOAK_CLIENT_ID: ironden-app
      CORS_ORIGINS: "http://192.168.1.14,http://localhost,http://localhost:3000"
      SHOW_MOCK_DATA: "false"
    expose:
      - "8000"
    depends_on:
      app-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - ironden
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: http://192.168.1.14:8080
        VITE_KEYCLOAK_REALM: ironden
        VITE_KEYCLOAK_CLIENT_ID: ironden-app
        VITE_API_URL: http://192.168.1.14/api
    container_name: ironden-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - ironden
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ironden-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ironden
    restart: unless-stopped

networks:
  ironden:
    driver: bridge

volumes:
  keycloak_db_data:
  app_db_data:
