# Use Docker's internal DNS — re-resolves upstream hostnames every 10 s
# so nginx never caches stale container IPs after a restart/recreate.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # ── React SPA ───────────────────────────────────────────────
    location / {
        set $fe http://frontend:80;
        proxy_pass $fe;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── AI endpoints (long-running Ollama streaming — 5 min timeout) ──
    location /api/ai/ {
        set $be http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $be;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # ── FastAPI backend  (strip /api prefix) ────────────────────
    location /api/ {
        set $be http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $be;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
    }
}
